services:
  - type: web
    name: databot-chatwoot
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main_chatwoot:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "postgres"
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: "langchain-pinecone-asistente-de-ventas"
      - key: TAVILY_API_KEY
        sync: false
      - key: CHATWOOT_BASE_URL
        sync: false
      - key: CHATWOOT_ACCOUNT_ID
        sync: false
      - key: CHATWOOT_API_ACCESS_TOKEN
        sync: false
      - key: CHATWOOT_BOT_LABEL
        value: "atiende-ia"
      - key: AGENT_TIMEZONE
        value: "America/Bogota"
